name: Update Global DIY

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/update-global-diy.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Patch Global_DIY.list
        run: |
          python3 <<'PY'
          from pathlib import Path

          path = Path('Global_DIY.list')
          workflow = Path('.github/workflows/update-global-diy.yml')

          def is_rule(line):
              s = line.strip()
              return bool(s) and not s.startswith('#')

          rules = [line.strip() for line in path.read_text(encoding='utf-8', errors='replace').splitlines() if is_rule(line)]

          def remove_all(item):
              global rules
              rules = [line for line in rules if line != item]

          def insert_after(anchor, additions):
              existing = set(rules)
              additions = [item for item in additions if item not in existing]
              if not additions:
                  return
              if anchor not in rules:
                  raise SystemExit(f'Missing anchor: {anchor}')
              idx = rules.index(anchor)
              rules[idx + 1:idx + 1] = additions

          # Remove obsolete/excluded line and move this suffix to its latest source position.
          remove_all('DOMAIN-SUFFIX,alfabank.oavdo.amc')
          remove_all('DOMAIN-SUFFIX,18comic.vip')

          insert_after('DOMAIN,adobeereg.com', ['DOMAIN,agb9r0ad.qllfkl.com'])
          insert_after('DOMAIN,gog.qtlglb.com', ['DOMAIN,hb4bbbbb.pmhcjk.com'])
          insert_after('DOMAIN,nationalaustraliaban.tt.omtrdc.net', ['DOMAIN,nbbb1bb7.pmhcjk.com'])
          insert_after('DOMAIN,push-apple.com.akadns.net', ['DOMAIN,q676790b.pmhcjk.com'])

          insert_after('DOMAIN-SUFFIX,18comic.org', ['DOMAIN-SUFFIX,18comic.vip'])
          insert_after('DOMAIN-SUFFIX,azureedge-test.net', ['DOMAIN-SUFFIX,azureedge.us'])
          insert_after('DOMAIN-SUFFIX,bestcamsites.net', ['DOMAIN-SUFFIX,bestchange.com', 'DOMAIN-SUFFIX,bestchange.net', 'DOMAIN-SUFFIX,bestchange.ru'])
          insert_after('DOMAIN-SUFFIX,bnu.ac.uk', ['DOMAIN-SUFFIX,bnxz.net'])
          insert_after('DOMAIN-SUFFIX,byspotify.com', ['DOMAIN-SUFFIX,bystys.tech'])
          insert_after('DOMAIN-SUFFIX,chatgpt.livekit.cloud', ['DOMAIN-SUFFIX,chatgpt.site'])
          insert_after('DOMAIN-SUFFIX,copac.ac.uk', ['DOMAIN-SUFFIX,copilot-stg.com'])
          insert_after('DOMAIN-SUFFIX,crocels.ac.uk', ['DOMAIN-SUFFIX,crocoblock.com'])
          insert_after('DOMAIN-SUFFIX,delcamusa.com', ['DOMAIN-SUFFIX,delets.online'])
          insert_after('DOMAIN-SUFFIX,getscorecash.com', ['DOMAIN-SUFFIX,getsentry.com'])
          insert_after('DOMAIN-SUFFIX,haplorrhini.com', ['DOMAIN-SUFFIX,happ.info', 'DOMAIN-SUFFIX,happ.su'])
          insert_after('DOMAIN-SUFFIX,kichikuou.com', ['DOMAIN-SUFFIX,kick.com'])
          insert_after('DOMAIN-SUFFIX,lihksnap.com', ['DOMAIN-SUFFIX,like-video.com', 'DOMAIN-SUFFIX,likee.com', 'DOMAIN-SUFFIX,likeeapp.ru', 'DOMAIN-SUFFIX,likeevideo.com', 'DOMAIN-SUFFIX,likeevideo.ru'])
          insert_after('DOMAIN-SUFFIX,mhdss.ac.uk', ['DOMAIN-SUFFIX,mhgui.com'])
          insert_after('DOMAIN-SUFFIX,moto.com', ['DOMAIN-SUFFIX,motocms.com'])
          insert_after('DOMAIN-SUFFIX,netwise.ac.uk', ['DOMAIN-SUFFIX,netxh.blog'])
          insert_after('DOMAIN-SUFFIX,oneme.ru', ['DOMAIN-SUFFIX,onemoment.cc'])
          insert_after('DOMAIN-SUFFIX,owsc.ac.uk', ['DOMAIN-SUFFIX,owxd.xyz'])
          insert_after('DOMAIN-SUFFIX,payecom.ru', ['DOMAIN-SUFFIX,payget.pro'])
          insert_after('DOMAIN-SUFFIX,platinumlinks.org', ['DOMAIN-SUFFIX,platov.co'])
          insert_after('DOMAIN-SUFFIX,qnap.com', ['DOMAIN-SUFFIX,qnapsupport.net'])
          insert_after('DOMAIN-SUFFIX,ram.ac.uk', ['DOMAIN-SUFFIX,ramon.cash', 'DOMAIN-SUFFIX,ramon.money'])
          insert_after('DOMAIN-SUFFIX,sentry-cdn.com', ['DOMAIN-SUFFIX,sentry.dev'])
          insert_after('DOMAIN-SUFFIX,starlink.ac.uk', ['DOMAIN-SUFFIX,starlink.com'])
          insert_after('DOMAIN-SUFFIX,temp-mail.org', ['DOMAIN-SUFFIX,templatemonster.com'])
          insert_after('DOMAIN-SUFFIX,uxxxporn.com', ['DOMAIN-SUFFIX,uxzw.club'])
          insert_after('DOMAIN-SUFFIX,wbbasket.ru', ['DOMAIN-SUFFIX,wbcontent.net'])
          insert_after('DOMAIN-SUFFIX,ysx-mm.com', ['DOMAIN-SUFFIX,yucf.top'])

          if len(rules) != 30574:
              raise SystemExit(f'Unexpected remaining rule count: {len(rules)}')

          header = [
              '# NAME: Global_DIY',
              '# CREATED: 2026-07-20',
              '# EXCLUDED: YouTube, Gemini, Google, Twitter, Telegram, OpenAI, Reddit, Instagram, Facebook, Nintendo, TikTok, Porn',
              '# REMOVED: 4275',
              '# REMAINING: 30574',
              '',
          ]
          path.write_text('\n'.join(header + rules) + '\n', encoding='utf-8')
          workflow.unlink(missing_ok=True)
          PY
      - name: Commit updated list
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Global_DIY.list .github/workflows/update-global-diy.yml
          git commit -m "Update Global_DIY.list" || exit 0
          git push
